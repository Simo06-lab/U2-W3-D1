<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pet Form</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body
    class="bg-black min-vh-100 d-flex justify-content-center align-items-center"
  >
    <div class="container-sm p-4">
      <form id="pet-form">
        <div class="row g-3">
          <div class="col-6">
            <input
              type="text"
              class="form-control form-control-lg bg-secondary-subtle border-0 text-white rounded-3"
              id="petName"
              placeholder="Nome animale"
              required
            />
          </div>
          <div class="col-6">
            <input
              type="text"
              class="form-control form-control-lg bg-secondary-subtle border-0 text-white rounded-3"
              id="ownerName"
              placeholder="Nome padrone"
              required
            />
          </div>
          <div class="col-6">
            <input
              type="text"
              class="form-control form-control-lg bg-secondary-subtle border-0 text-white rounded-3"
              id="species"
              placeholder="Specie"
              required
            />
          </div>
          <div class="col-6">
            <input
              type="text"
              class="form-control form-control-lg bg-secondary-subtle border-0 text-white rounded-3"
              id="breed"
              placeholder="Razza"
              required
            />
          </div>
          <div class="col-12">
            <button
              type="submit"
              class="btn btn-outline-light btn-lg w-100 rounded-3"
            >
              + Aggiungi Pet
            </button>
          </div>
        </div>
      </form>
      <div id="pet-list" class="row g-3 mt-2"></div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./pet.js"></script>
  </body>
</html>
